services:
  - type: web
    name: schedule-manager
    runtime: python
    plan: starter          # $7/month・常時稼働（freeはスリープするので不可）
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:flask_app --bind 0.0.0.0:$PORT --workers 1 --timeout 60
    envVars:
      - key: SLACK_BOT_TOKEN
        sync: false        # Renderダッシュボードで手動入力
      - key: SLACK_SIGNING_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: MANAGEMENT_CHANNEL_IDS
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false        # credentials.json の中身をそのまま貼り付ける
      - key: MESSAGE_FETCH_COUNT
        value: "15"
